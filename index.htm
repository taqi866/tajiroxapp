<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TAJIROX</title>

<!-- favicon -->
<link rel="icon" type="image/png" href="favicon.png">

<!-- icône iphone -->
<link rel="apple-touch-icon" href="icon-192.png">

<!-- manifest -->
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#007BFF">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#ffffff;
overflow:hidden;
}

/* loader */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffffff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

/* logo */

.logo{
font-size:clamp(30px,5vw,44px);
font-weight:700;
letter-spacing:4px;
margin-bottom:40px;

background:linear-gradient(90deg,#007BFF,#4da3ff,#007BFF);
background-size:200% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 3s linear infinite;
}

@keyframes shine{
0%{background-position:0% center;}
100%{background-position:200% center;}
}

/* barre chargement */

.progress{
width:220px;
height:4px;
background:#e6e6e6;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
width:40%;
height:100%;
background:#007BFF;
animation:loading 1.5s infinite;
}

@keyframes loading{
0%{margin-left:-40%;}
100%{margin-left:100%;}
}

/* iframe */

iframe{
border:none;
width:100%;
height:100vh;
}

</style>

</head>

<body>

<div id="loader">

<div class="logo">
TAJIROX
</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

</div>

<iframe
src="https://script.google.com/macros/s/AKfycbwGZxNcwxEoRr4UO-q9Y0GMALJGKqfmEyYHk7anabOhfC_Bo1Jtj9Vw1jKsGg_41YZWig/exec"
onload="document.getElementById('loader').style.display='none';">
</iframe>

<script>

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
